name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'LICENSE'
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: read
  actions: read

concurrency:
  group: "github-pages-${{ github.ref }}"
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: full
  RUST_STABLE_VERSION: 1.80.0
  TRUNK_VERSION: 0.21.0
  BUILD_TARGET: wasm32-unknown-unknown
  BUILD_TYPE: release
  PUBLIC_URL: "/ConwayDuel/"
  REPORT_FILE: build-failure-report.md
  BUILD_LOG_FILE: build.log

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
      actions: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_STABLE_VERSION }}
          targets: ${{ env.BUILD_TARGET }}

      # 修复1：save-always 仅在 cache 步骤内，且语法正确
      - name: Cache Trunk binary
        uses: actions/cache@v4
        id: cache-trunk-binary
        with:
          path: /home/runner/.cargo/bin/trunk
          key: ${{ runner.os }}-${{ runner.arch }}-trunk-binary-v${{ env.TRUNK_VERSION }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-trunk-binary-
          save-always: true

      - name: Debug Trunk cache status
        run: |
          echo "===== Trunk 缓存状态 ====="
          echo "缓存是否命中: ${{ steps.cache-trunk-binary.outputs.cache-hit }}"
          echo "Trunk 二进制是否存在: $(test -f /home/runner/.cargo/bin/trunk && echo "是" || echo "否")"
          if [ -f /home/runner/.cargo/bin/trunk ]; then
            echo "Trunk 版本: $(/home/runner/.cargo/bin/trunk --version)"
          fi

      - name: Install Trunk (cargo official)
        if: steps.cache-trunk-binary.outputs.cache-hit != 'true' || !test -f /home/runner/.cargo/bin/trunk
        run: |
          echo "开始安装 Trunk v${{ env.TRUNK_VERSION }}"
          for i in 1 2 3; do
            cargo install trunk --version ${{ env.TRUNK_VERSION }} --locked && break
            echo "Trunk 安装尝试 $i 失败，5秒后重试..."
            sleep 5
          done
          chmod +x /home/runner/.cargo/bin/trunk
          /home/runner/.cargo/bin/trunk --version

      - name: Cache Cargo registry & git dependencies
        uses: actions/cache@v4
        id: cache-cargo-registry
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ env.RUST_STABLE_VERSION }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-${{ env.RUST_STABLE_VERSION }}-
          save-always: true

      - name: Cache Trunk toolchain
        uses: actions/cache@v4
        id: cache-trunk-toolchain
        with:
          path: ~/.cache/trunk
          key: ${{ runner.os }}-trunk-toolchain-v${{ env.TRUNK_VERSION }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-trunk-toolchain-v${{ env.TRUNK_VERSION }}-
          save-always: true

      - name: Cache Rust build target
        uses: actions/cache@v4
        id: cache-rust-target
        with:
          path: target
          key: ${{ runner.os }}-target-${{ env.RUST_STABLE_VERSION }}-${{ env.BUILD_TARGET }}-${{ env.BUILD_TYPE }}-${{ hashFiles('Cargo.lock') }}-${{ hashFiles('src/**/*.rs') }}
          restore-keys: |
            ${{ runner.os }}-target-${{ env.RUST_STABLE_VERSION }}-${{ env.BUILD_TARGET }}-${{ env.BUILD_TYPE }}-${{ hashFiles('Cargo.lock') }}-
            ${{ runner.os }}-target-${{ env.RUST_STABLE_VERSION }}-${{ env.BUILD_TARGET }}-${{ env.BUILD_TYPE }}-
            ${{ runner.os }}-target-${{ env.RUST_STABLE_VERSION }}-${{ env.BUILD_TARGET }}-
          save-always: true

      - name: Verify build environment
        id: env-verify
        run: |
          echo "===== 构建环境校验 ====="
          rustc --version
          cargo --version
          trunk --version
          rustup target list | grep ${{ env.BUILD_TARGET }}
          echo "RUSTC_VERSION=$(rustc --version)" >> $GITHUB_OUTPUT
          echo "TRUNK_VERSION=$(trunk --version)" >> $GITHUB_OUTPUT

      # 修复2：PUBLIC_URL 引用格式正确，无多余引号
      - name: Build project
        id: build-project
        run: |
          echo "===== 开始项目构建 ====="
          trunk build --${{ env.BUILD_TYPE }} --public-url ${{ env.PUBLIC_URL }} --locked 2>&1 | tee ${{ env.BUILD_LOG_FILE }}

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload build artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Generate build failure report
        id: generate-report
        if: failure()
        run: |
          echo "===== 生成构建失败报告 ====="
          grep -E 'error:|warning:|fatal:|Caused by:|error\[' ${{ env.BUILD_LOG_FILE }} > error-summary.txt || true
          cat > ${{ env.REPORT_FILE }} << EOF
          # ConwayDuel 构建失败报告
          ## 基本信息
          | 项 | 内容 |
          |---|---|
          | 构建ID | ${{ github.run_id }} |
          | 触发分支 | ${{ github.ref_name }} |
          | 提交哈希 | ${{ github.sha }} |
          | 触发人 | ${{ github.triggering_actor }} |
          | 构建时间 | $(date -u +"%Y-%m-%d %H:%M:%S UTC") |
          | 完整构建日志 | [点击查看](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |

          ## 环境信息
          | 项 | 内容 |
          |---|---|
          | 运行系统 | ${{ runner.os }} ${{ runner.arch }} |
          | Rust 版本 | ${{ steps.env-verify.outputs.RUSTC_VERSION }} |
          | Trunk 版本 | ${{ steps.env-verify.outputs.TRUNK_VERSION }} |
          | 构建目标 | ${{ env.BUILD_TARGET }} |
          | 构建类型 | ${{ env.BUILD_TYPE }} |

          ## 核心错误摘要
          \`\`\`
          $(cat error-summary.txt | head -100)
          \`\`\`

          > 注：以上为精简错误摘要，完整日志请点击上方「完整构建日志」链接查看，或下载本次构建的附件日志文件
          EOF
          echo "===== 构建失败精简报告 ====="
          cat ${{ env.REPORT_FILE }}

      - name: Upload failure report
        if: failure() && steps.generate-report.conclusion == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: build-failure-report-${{ github.run_id }}
          path: |
            ${{ env.REPORT_FILE }}
            ${{ env.BUILD_LOG_FILE }}
          retention-days: 30

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    needs: build
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
