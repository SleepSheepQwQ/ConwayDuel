name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'LICENSE'
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: read # 全局只读，按需在对应Job开放写入权限
  actions: read # 用于获取构建日志链接

concurrency:
  group: "github-pages-${{ github.ref }}"
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: full
  RUST_STABLE_VERSION: 1.80.0
  TRUNK_VERSION: 0.21.0
  BUILD_TARGET: wasm32-unknown-unknown
  BUILD_TYPE: release
  # 错误报告配置
  REPORT_FILE: build-failure-report.md
  BUILD_LOG_FILE: build.log

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_STABLE_VERSION }}
          targets: ${{ env.BUILD_TARGET }}

      # 分层缓存（完全保留之前的极致优化）
      - name: Cache Trunk binary
        uses: actions/cache@v4
        id: cache-trunk-binary
        with:
          path: ~/.cargo/bin/trunk
          key: ${{ runner.os }}-trunk-binary-${{ env.TRUNK_VERSION }}-${{ env.RUST_STABLE_VERSION }}

      - name: Install Trunk
        if: steps.cache-trunk-binary.outputs.cache-hit != 'true'
        run: |
          for i in 1 2 3; do
            cargo install trunk --version ${{ env.TRUNK_VERSION }} --locked && break
            echo "Trunk install attempt $i failed, retrying in 5s..."
            sleep 5
          done

      - name: Cache Cargo registry & git dependencies
        uses: actions/cache@v4
        id: cache-cargo-registry
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ env.RUST_STABLE_VERSION }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-${{ env.RUST_STABLE_VERSION }}-

      - name: Cache Trunk toolchain
        uses: actions/cache@v4
        id: cache-trunk-toolchain
        with:
          path: ~/.cache/trunk
          key: ${{ runner.os }}-trunk-toolchain-${{ env.TRUNK_VERSION }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-trunk-toolchain-${{ env.TRUNK_VERSION }}-

      - name: Cache Rust build target
        uses: actions/cache@v4
        id: cache-rust-target
        with:
          path: target
          key: ${{ runner.os }}-target-${{ env.RUST_STABLE_VERSION }}-${{ env.BUILD_TARGET }}-${{ env.BUILD_TYPE }}-${{ hashFiles('Cargo.lock') }}-${{ hashFiles('src/**/*.rs') }}
          restore-keys: |
            ${{ runner.os }}-target-${{ env.RUST_STABLE_VERSION }}-${{ env.BUILD_TARGET }}-${{ env.BUILD_TYPE }}-${{ hashFiles('Cargo.lock') }}-
            ${{ runner.os }}-target-${{ env.RUST_STABLE_VERSION }}-${{ env.BUILD_TARGET }}-${{ env.BUILD_TYPE }}-
            ${{ runner.os }}-target-${{ env.RUST_STABLE_VERSION }}-${{ env.BUILD_TARGET }}-

      - name: Verify build environment
        id: env-verify
        run: |
          rustc --version
          cargo --version
          trunk --version
          rustup target list | grep ${{ env.BUILD_TARGET }}
          # 保存版本信息到环境变量，用于错误报告
          echo "RUSTC_VERSION=$(rustc --version)" >> $GITHUB_OUTPUT
          echo "TRUNK_VERSION=$(trunk --version)" >> $GITHUB_OUTPUT

      # 核心修改1：构建时同步捕获完整日志，同时保留控制台输出
      - name: Build project
        id: build-project
        run: |
          # 2>&1 合并stdout/stderr，tee同时输出到控制台和日志文件
          trunk build --${{ env.BUILD_TYPE }} --public-url "/ConwayDuel/" --locked 2>&1 | tee ${{ env.BUILD_LOG_FILE }}

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload build artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      # ==============================================
      # 构建失败错误报告模块（仅构建失败时执行）
      # ==============================================
      # 核心修改2：生成精简错误报告
      - name: Generate build failure report
        id: generate-report
        if: failure() # 仅当前面步骤失败时执行
        run: |
          # 1. 提取核心错误信息（过滤冗余编译进度，只保留错误/警告/根因）
          echo "===== 提取核心错误信息 ====="
          grep -E 'error:|warning:|fatal:|Caused by:|error\[' ${{ env.BUILD_LOG_FILE }} > error-summary.txt || true

          # 2. 生成Markdown格式的精简报告
          cat > ${{ env.REPORT_FILE }} << EOF
          # ConwayDuel 构建失败报告
          ## 基本信息
          | 项 | 内容 |
          |---|---|
          | 构建ID | ${{ github.run_id }} |
          | 触发分支 | ${{ github.ref_name }} |
          | 提交哈希 | ${{ github.sha }} |
          | 触发人 | ${{ github.triggering_actor }} |
          | 构建时间 | $(date -u +"%Y-%m-%d %H:%M:%S UTC") |
          | 完整构建日志 | [点击查看](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |

          ## 环境信息
          | 项 | 内容 |
          |---|---|
          | 运行系统 | ${{ runner.os }} ${{ runner.arch }} |
          | Rust 版本 | ${{ steps.env-verify.outputs.RUSTC_VERSION }} |
          | Trunk 版本 | ${{ steps.env-verify.outputs.TRUNK_VERSION }} |
          | 构建目标 | ${{ env.BUILD_TARGET }} |
          | 构建类型 | ${{ env.BUILD_TYPE }} |

          ## 核心错误摘要
          \`\`\`
          $(cat error-summary.txt | head -100) # 最多显示100行，避免报告过长
          \`\`\`

          > 注：以上为精简错误摘要，完整日志请点击上方「完整构建日志」链接查看
          EOF

          # 3. 输出报告到控制台，方便直接查看
          echo "===== 构建失败精简报告 ====="
          cat ${{ env.REPORT_FILE }}

      # 核心修改3：上传错误报告到Actions制品（官方原生能力，零风险）
      - name: Upload failure report to Actions Artifacts
        if: failure() && steps.generate-report.conclusion == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: build-failure-report-${{ github.run_id }}
          path: |
            ${{ env.REPORT_FILE }}
            ${{ env.BUILD_LOG_FILE }}
          retention-days: 30 # 报告保留30天，可按需调整

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    needs: build
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # 可选：提交错误报告到专用分支（适合需要长期归档的场景，默认注释，按需开启）
