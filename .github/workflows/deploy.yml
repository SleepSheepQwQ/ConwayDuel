name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'LICENSE'
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "github-pages-${{ github.ref }}"
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: full
  RUST_STABLE_VERSION: 1.80.0
  TRUNK_VERSION: 0.21.0
  BUILD_TARGET: wasm32-unknown-unknown
  BUILD_TYPE: release
  PUBLIC_URL: "/ConwayDuel/"
  REPORT_FILE: build-failure-report.md
  BUILD_LOG_FILE: build.log

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_STABLE_VERSION }}
          targets: ${{ env.BUILD_TARGET }}

      - name: Cache Trunk binary
        uses: actions/cache@v4
        id: cache-trunk-binary
        with:
          path: /home/runner/.cargo/bin/trunk
          key: trunk-${{ runner.os }}-${{ runner.arch }}-v${{ env.TRUNK_VERSION }}
          restore-keys: |
            trunk-${{ runner.os }}-${{ runner.arch }}-

      - name: Debug Trunk cache status
        run: |
          echo "===== Trunk 缓存状态 ====="
          echo "缓存是否命中: ${{ steps.cache-trunk-binary.outputs.cache-hit }}"
          if [ -f /home/runner/.cargo/bin/trunk ]; then
            echo "Trunk 二进制存在，版本: $(/home/runner/.cargo/bin/trunk --version 2>/dev/null || echo '无法获取版本')"
          else
            echo "Trunk 二进制不存在"
          fi

      - name: Install Trunk
        if: steps.cache-trunk-binary.outputs.cache-hit != 'true'
        run: |
          echo "开始安装 Trunk v${{ env.TRUNK_VERSION }}"
          for i in 1 2 3; do
            if cargo install trunk --version ${{ env.TRUNK_VERSION }} --locked; then
              echo "Trunk 安装成功"
              break
            fi
            echo "Trunk 安装尝试 $i 失败，5秒后重试..."
            sleep 5
          done
          chmod +x /home/runner/.cargo/bin/trunk
          trunk --version

      - name: Cache Cargo registry
        uses: actions/cache@v4
        id: cache-cargo-registry
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ env.RUST_STABLE_VERSION }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ env.RUST_STABLE_VERSION }}-

      - name: Cache Trunk toolchain
        uses: actions/cache@v4
        id: cache-trunk-toolchain
        with:
          path: ~/.cache/trunk
          key: ${{ runner.os }}-trunk-${{ env.TRUNK_VERSION }}-${{ hashFiles('**/Cargo.toml', '**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-trunk-${{ env.TRUNK_VERSION }}-

      - name: Verify build environment
        id: env-verify
        run: |
          echo "===== 构建环境校验 ====="
          rustc --version
          cargo --version
          trunk --version || echo "警告: trunk 命令未找到"
          rustup target list | grep -q "${{ env.BUILD_TARGET }}" && echo "构建目标可用: ${{ env.BUILD_TARGET }}"
          echo "RUSTC_VERSION=$(rustc --version | head -1)" >> $GITHUB_OUTPUT
          echo "TRUNK_VERSION=$(trunk --version 2>/dev/null | head -1 || echo '未安装')" >> $GITHUB_OUTPUT

      - name: Build project
        id: build-project
        run: |
          echo "===== 开始项目构建 ====="
          echo "PUBLIC_URL: ${{ env.PUBLIC_URL }}"
          trunk build --${{ env.BUILD_TYPE }} --public-url ${{ env.PUBLIC_URL }} --locked 2>&1 | tee "${{ env.BUILD_LOG_FILE }}"
          BUILD_EXIT_CODE="${PIPESTATUS[0]}"
          echo "构建退出代码: $BUILD_EXIT_CODE"
          exit $BUILD_EXIT_CODE

      - name: Setup GitHub Pages
        if: success()
        uses: actions/configure-pages@v5

      - name: Upload build artifact
        if: success()
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Generate build failure report
        if: failure()
        id: generate-report
        run: |
          echo "===== 生成构建失败报告 ====="
          grep -E 'error:|warning:|fatal:|Caused by:|error\[' "${{ env.BUILD_LOG_FILE }}" > error-summary.txt 2>/dev/null || true
          
          cat > "${{ env.REPORT_FILE }}" << EOF
          # ConwayDuel 构建失败报告
          ## 基本信息
          | 项 | 内容 |
          |---|---|
          | 构建ID | ${{ github.run_id }} |
          | 触发分支 | ${{ github.ref_name }} |
          | 提交哈希 | ${{ github.sha }} |
          | 触发人 | ${{ github.triggering_actor }} |
          | 构建时间 | $(date -u +"%Y-%m-%d %H:%M:%S UTC") |
          | 完整构建日志 | [点击查看](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |

          ## 环境信息
          | 项 | 内容 |
          |---|---|
          | 运行系统 | ${{ runner.os }} ${{ runner.arch }} |
          | Rust 版本 | ${{ steps.env-verify.outputs.RUSTC_VERSION }} |
          | Trunk 版本 | ${{ steps.env-verify.outputs.TRUNK_VERSION }} |
          | 构建目标 | ${{ env.BUILD_TARGET }} |
          | 构建类型 | ${{ env.BUILD_TYPE }} |

          ## 核心错误摘要
          \`\`\`
          $(head -100 error-summary.txt 2>/dev/null || echo "无错误摘要信息")
          \`\`\`

          > 注：以上为精简错误摘要，完整日志请点击上方「完整构建日志」链接查看
          EOF
          
          echo "===== 构建失败报告已生成 ====="
          ls -la "${{ env.REPORT_FILE }}"

      - name: Upload failure report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-failure-report-${{ github.run_id }}
          path: |
            ${{ env.REPORT_FILE }}
            ${{ env.BUILD_LOG_FILE }}
          retention-days: 30

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    needs: build
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
