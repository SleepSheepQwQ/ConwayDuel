name: ConwayDuel CI/CD

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: full

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install Trunk
        uses: jetli/trunk-action@v0.5.0
        with:
          version: latest

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Compile Check
        id: compile
        run: |
          set -o pipefail
          mkdir -p reports
          cargo check --target wasm32-unknown-unknown 2>&1 | tee reports/compile_output.txt

      - name: Generate Detailed Error Report
        if: failure()
        run: |
          mkdir -p reports
          
          # 生成报告头部
          echo "============================================================================" > reports/error_report.txt
          echo "                    ConwayDuel Compilation Error Report" >> reports/error_report.txt
          echo "============================================================================" >> reports/error_report.txt
          echo "" >> reports/error_report.txt
          echo "Generated: $(date '+%Y-%m-%d %H:%M:%S UTC')" >> reports/error_report.txt
          echo "Commit: ${{ github.sha }}" >> reports/error_report.txt
          echo "Branch: ${{ github.ref_name }}" >> reports/error_report.txt
          echo "Actor: ${{ github.actor }}" >> reports/error_report.txt
          echo "" >> reports/error_report.txt
          
          # 统计
          ERROR_COUNT=$(grep -c "^error" reports/compile_output.txt 2>/dev/null || echo "0")
          WARNING_COUNT=$(grep -c "^warning" reports/compile_output.txt 2>/dev/null || echo "0")
          
          echo "============================================================================" >> reports/error_report.txt
          echo "SUMMARY" >> reports/error_report.txt
          echo "============================================================================" >> reports/error_report.txt
          echo "Total Errors: $ERROR_COUNT" >> reports/error_report.txt
          echo "Total Warnings: $WARNING_COUNT" >> reports/error_report.txt
          echo "" >> reports/error_report.txt
          
          # 解析每个错误
          echo "============================================================================" >> reports/error_report.txt
          echo "ERROR DETAILS" >> reports/error_report.txt
          echo "============================================================================" >> reports/error_report.txt
          
          ERROR_NUM=0
          CURRENT_FILE=""
          CURRENT_LINE=""
          
          while IFS= read -r line; do
            # 检测错误行
            if echo "$line" | grep -qE "^error\[E[0-9]+\]:"; then
              ERROR_NUM=$((ERROR_NUM + 1))
              ERROR_CODE=$(echo "$line" | grep -oE 'E[0-9]+')
              ERROR_MSG=$(echo "$line" | sed 's/^error\[E[0-9]*\]: //')
              echo "" >> reports/error_report.txt
              echo "----------------------------------------------------------------------------" >> reports/error_report.txt
              echo "[ERROR #$ERROR_NUM]" >> reports/error_report.txt
              echo "----------------------------------------------------------------------------" >> reports/error_report.txt
              echo "Error Code: $ERROR_CODE" >> reports/error_report.txt
              echo "Message: $ERROR_MSG" >> reports/error_report.txt
            fi
            
            # 检测文件位置
            if echo "$line" | grep -qE "^\s+-->.+\.rs:[0-9]+:[0-9]+"; then
              LOCATION=$(echo "$line" | grep -oE '[^/]+\.rs:[0-9]+:[0-9]+')
              FILE_NAME=$(echo "$LOCATION" | cut -d: -f1)
              LINE_NUM=$(echo "$LOCATION" | cut -d: -f2)
              COL_NUM=$(echo "$LOCATION" | cut -d: -f3)
              CURRENT_FILE="$FILE_NAME"
              CURRENT_LINE="$LINE_NUM"
              echo "File: $FILE_NAME" >> reports/error_report.txt
              echo "Line: $LINE_NUM" >> reports/error_report.txt
              echo "Column: $COL_NUM" >> reports/error_report.txt
              
              # 读取代码内容
              if [ -f "$FILE_NAME" ]; then
                CODE_LINE=$(sed -n "${LINE_NUM}p" "$FILE_NAME" 2>/dev/null)
                if [ -n "$CODE_LINE" ]; then
                  echo "" >> reports/error_report.txt
                  echo "Code at line $LINE_NUM:" >> reports/error_report.txt
                  echo "  $CODE_LINE" >> reports/error_report.txt
                  # 显示上下文
                  START_LINE=$((LINE_NUM - 2))
                  [ $START_LINE -lt 1 ] && START_LINE=1
                  END_LINE=$((LINE_NUM + 2))
                  echo "" >> reports/error_report.txt
                  echo "Context (lines $START_LINE-$END_LINE):" >> reports/error_report.txt
                  sed -n "${START_LINE},${END_LINE}p" "$FILE_NAME" | nl -v $START_LINE >> reports/error_report.txt
                fi
              fi
            fi
            
            # 检测帮助信息
            if echo "$line" | grep -qE "^\s*= help:"; then
              HELP_MSG=$(echo "$line" | sed 's/^\s*= help: //')
              echo "Help: $HELP_MSG" >> reports/error_report.txt
            fi
            
            # 检测备注
            if echo "$line" | grep -qE "^\s*= note:"; then
              NOTE_MSG=$(echo "$line" | sed 's/^\s*= note: //')
              echo "Note: $NOTE_MSG" >> reports/error_report.txt
            fi
            
            # 检测建议
            if echo "$line" | grep -qE "^\s*= suggestion:"; then
              SUG_MSG=$(echo "$line" | sed 's/^\s*= suggestion: //')
              echo "Suggestion: $SUG_MSG" >> reports/error_report.txt
            fi
          done < reports/compile_output.txt
          
          # 错误代码说明
          echo "" >> reports/error_report.txt
          echo "============================================================================" >> reports/error_report.txt
          echo "COMMON ERROR CODES REFERENCE" >> reports/error_report.txt
          echo "============================================================================" >> reports/error_report.txt
          echo "E0107 - Missing generic type parameter" >> reports/error_report.txt
          echo "E0277 - Trait bound not satisfied (type missing required trait)" >> reports/error_report.txt
          echo "E0308 - Type mismatch (expected one type, found another)" >> reports/error_report.txt
          echo "E0425 - Cannot find value (variable/function not in scope)" >> reports/error_report.txt
          echo "E0433 - Cannot find module or crate (import path invalid)" >> reports/error_report.txt
          echo "E0599 - No method found (method does not exist on this type)" >> reports/error_report.txt
          echo "E0616 - Cannot access private field" >> reports/error_report.txt
          echo "E0658 - Unstable feature (requires nightly Rust)" >> reports/error_report.txt
          echo "E0716 - Lifetime issue (reference lifetime unclear)" >> reports/error_report.txt
          echo "E0432 - Unresolved import" >> reports/error_report.txt
          echo "E0301 - Borrow mutably while borrowed" >> reports/error_report.txt
          echo "E0382 - Use of moved value" >> reports/error_report.txt
          echo "" >> reports/error_report.txt
          
          # 完整日志
          echo "============================================================================" >> reports/error_report.txt
          echo "FULL COMPILATION LOG" >> reports/error_report.txt
          echo "============================================================================" >> reports/error_report.txt
          cat reports/compile_output.txt >> reports/error_report.txt
          
          # 显示报告
          echo ""
          echo "=========================================="
          echo "ERROR REPORT GENERATED"
          echo "=========================================="
          cat reports/error_report.txt

      - name: Upload Error Report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-report
          path: reports/error_report.txt
          retention-days: 90

      - name: Build Release
        id: build
        run: |
          set -o pipefail
          mkdir -p reports
          trunk build --release 2>&1 | tee reports/build_output.txt

      - name: Generate Build Error Report
        if: failure()
        run: |
          mkdir -p reports
          
          echo "============================================================================" > reports/build_error_report.txt
          echo "                    ConwayDuel Build Error Report" >> reports/build_error_report.txt
          echo "============================================================================" >> reports/build_error_report.txt
          echo "" >> reports/build_error_report.txt
          echo "Generated: $(date '+%Y-%m-%d %H:%M:%S UTC')" >> reports/build_error_report.txt
          echo "Commit: ${{ github.sha }}" >> reports/build_error_report.txt
          echo "Branch: ${{ github.ref_name }}" >> reports/build_error_report.txt
          echo "" >> reports/build_error_report.txt
          
          # 解析构建错误
          echo "============================================================================" >> reports/build_error_report.txt
          echo "BUILD ERRORS" >> reports/build_error_report.txt
          echo "============================================================================" >> reports/build_error_report.txt
          
          while IFS= read -r line; do
            if echo "$line" | grep -qE "^error"; then
              echo "" >> reports/build_error_report.txt
              echo "[ERROR] $line" >> reports/build_error_report.txt
            fi
            if echo "$line" | grep -qE "^\s+-->.+\.rs:[0-9]+:[0-9]+"; then
              LOCATION=$(echo "$line" | grep -oE '[^/]+\.rs:[0-9]+:[0-9]+')
              FILE_NAME=$(echo "$LOCATION" | cut -d: -f1)
              LINE_NUM=$(echo "$LOCATION" | cut -d: -f2)
              echo "  File: $FILE_NAME, Line: $LINE_NUM" >> reports/build_error_report.txt
              if [ -f "$FILE_NAME" ]; then
                CODE_LINE=$(sed -n "${LINE_NUM}p" "$FILE_NAME" 2>/dev/null)
                echo "  Code: $CODE_LINE" >> reports/build_error_report.txt
              fi
            fi
          done < reports/build_output.txt
          
          echo "" >> reports/build_error_report.txt
          echo "============================================================================" >> reports/build_error_report.txt
          echo "FULL BUILD LOG" >> reports/build_error_report.txt
          echo "============================================================================" >> reports/build_error_report.txt
          cat reports/build_output.txt >> reports/build_error_report.txt
          
          cat reports/build_error_report.txt

      - name: Upload Build Error Report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-error-report
          path: reports/build_error_report.txt
          retention-days: 90

      - name: Upload Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: conway-duel-dist
          path: dist/
          retention-days: 30

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    
    permissions:
      contents: read
      pages: write
      id-token: write
    
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: conway-duel-dist
          path: dist/

      - name: Configure Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
