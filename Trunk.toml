# Trunk 构建配置，Rust Wasm 项目专用打包工具
trunk-version = ">=0.20.0"
# 项目入口HTML文件
target = "index.html"
# 构建产物输出目录
dist = "dist"
# 基础路径，本地开发用"/"，部署到GitHub Pages改为"/你的仓库名/"
public-url = "/"

# 开发服务器配置，适配Termux环境
[serve]
# 监听所有网卡，手机本地可直接访问
port = 8080
hostname = "0.0.0.0"
# 不自动打开浏览器（Termux无桌面环境）
open = false
# 自动刷新间隔
watch-interval = 500

# 构建优化配置
[build]
# 自动压缩构建产物
release = true
# 公共资源目录
public-dir = "src/assets"
